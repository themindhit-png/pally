<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла успешно</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            padding: 32px;
            text-align: center;
        }
        .checkmark {
            width: 64px;
            height: 64px;
            background: #10b981;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 12px;
            color: #1f2937;
        }
        p {
            color: #4b5563;
            line-height: 1.5;
            margin: 8px 0;
        }
        .button {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 40px;
            margin-top: 24px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">✓</div>
        <h1>Оплата прошла успешно!</h1>
        <p>Спасибо за оплату. Ваш заказ принят в работу.</p>
        <p>Я свяжусь с вами в Telegram в ближайшее время.</p>
        <a href="https://t.me/futuhunter" class="button">Написать в Telegram</a>
    </div>
</body>
</html>
